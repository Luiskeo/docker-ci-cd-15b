name: CI Setup
on:
    push:
        branches:
            - main

jobs:
    build-backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: test15b
        steps:
            - name: Descargar codigo
              uses: actions/checkout@v3

            - name: instalar java 21
              uses: actions/setup-java@v3
              with:
                  distribution: "temurin"
                  java-version: "21"

            - name: compilar proyecto
              run: mvn clean package -DskipTests

            - name: verificar el jar generado
              run: ls -l target/*.jar

            - name: construir imagen docker
              run: docker build -t backend-spring .

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: construir imagen docker
              run: docker build -t docker push luiskeo/backend_spring:latest .

            - name: Publicar imagen a DockerHub
              run: docker push luiskeo/backend_spring:latest

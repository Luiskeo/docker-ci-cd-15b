name: CI Setup
on:
    push:
        branches:
            - main

jobs:
    build-backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: test15b
        steps:
            - name: Descargar codigo
              uses: actions/checkout@v3

            - name: instalar java 21
              uses: actions/setup-java@v3
              with:
                  distribution: "temurin"
                  java-version: "21"

            - name: compilar proyecto
              run: mvn clean package -DskipTests

            - name: verificar el jar generado
              run: ls -l target/*.jar

            - name: construir imagen docker
              run: docker build -t backend-spring .
            - name: Login Docker hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}
            - name: Construir imagen Docker
              run: docker build -t luiskeo/backend-spring:latest .
            - name: Publicar imagen Docker en Docker Hub
              run: docker push luiskeo/backend-spring:latest
    deploy-backend:
        needs: build-backend
        runs-on: self-hosted
        steps:
            - name: Actualizar contenedor backend
              run: |
                  cd C:\Users\DELL\Desktop\projects\proyecto_docker_compose_limpio
                  docker compose pull backend
                  docker compose up -d backend
